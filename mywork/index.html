<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pizza Ordering Form</title>
</head>
<body>

<h1>Pizza Ordering Form</h1>

<form action="#" method="post">

    <fieldset>
        <legend>Contact Information</legend>

        <label>
            Name:
            <input type="text" name="name" required>
        </label>
        <br><br>

        <label>
            Phone:
            <input type="tel" name="phone" required>
        </label>
        <br><br>

        <label>
            Email:
            <input type="email" name="email" required>
        </label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Select Pizza Size</legend>

        <label>
            Pizza Size:
            <select name="size" required>
                <option value="">--Select Size--</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
                <option value="xlarge">XLarge</option>
            </select>
        </label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Select Sauce</legend>

        <label>
            <input type="radio" name="sauce" value="marinara" required>
            Marinara
        </label>
        <br>

        <label>
            <input type="radio" name="sauce" value="ranch">
            Ranch
        </label>
        <br>

        <label>
            <input type="radio" name="sauce" value="none">
            No Sauce
        </label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Select Toppings</legend>

        <label><input type="checkbox" name="toppings" value="pepperoni"> Pepperoni</label><br>
        <label><input type="checkbox" name="toppings" value="sausage"> Sausage</label><br>
        <label><input type="checkbox" name="toppings" value="mushrooms"> Mushrooms</label><br>
        <label><input type="checkbox" name="toppings" value="pineapple"> Pineapple</label><br>
        <label><input type="checkbox" name="toppings" value="peppers"> Peppers</label><br>
        <label><input type="checkbox" name="toppings" value="onions"> Onions</label>
    </fieldset>

    <br>

    <fieldset>
        <legend>Additional Instructions</legend>

        <textarea name="instructions" rows="4" cols="30">Add instructions</textarea>
    </fieldset>

    <br>

    <input type="submit" value="Submit">

</form>

<br><br>

<h2>List of My Favorite Games</h2>

<table border="1">
    <caption>Favorite Video Games</caption>

    <thead>
        <tr>
            <th>Developer</th>
            <th>Title</th>
            <th>Year</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td rowspan="2">FromSoftware</td>
            <td>Elden Ring</td>
            <td>2022</td>
        </tr>
        <tr>
            <td>Elden Ring Nightreign</td>
            <td>2025</td>
        </tr>
        <tr>
            <td>Mojang</td>
            <td colspan="2">Minecraft (2011)</td>
        </tr>
        <tr>
            <td colspan="3">Count: 3</td>
        </tr>
    </tbody>
</table>

</body>
</html>
