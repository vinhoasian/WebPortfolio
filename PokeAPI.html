<!DOCTYPE html>
<html>
<head>
    <title>PokeAPI Team Builder</title>
    <link rel="stylesheet" href="PokeAPI.css">
    <script src="PokeAPI.js"></script>
</head>

<body>

<div class="card">

    <h2>Name or ID</h2>
    <input type="text" id="pokemonInput">
    <button id="searchBtn">Find</button>

    <div>
        <img id="pokemonImage">
    </div>

    <audio id="pokemonAudio" controls></audio>

    <div class="moves">
        <select id="move1"></select>
        <select id="move2"></select>
        <select id="move3"></select>
        <select id="move4"></select>
    </div>

    <button id="addBtn">Add to Team</button>

    <div class="team-container" id="team"></div>

</div>

<script src="PokeAPI.js"></script>
</body>
</html>
